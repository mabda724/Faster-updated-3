name: faster_app
description: "Faster - خدمات منزلية تثق فيها"
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  font_awesome_flutter: ^11.0.0
  flutter_screenutil: ^5.9.3
  flutter_riverpod: ^2.5.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2
  supabase_flutter: ^2.8.4
  image_picker: ^1.1.2
  intl: ^0.20.2
  uuid: ^4.5.1
  http: ^1.2.2
  dio: ^5.9.2
  url_launcher: ^6.3.2
  geolocator: ^13.0.2
  fl_chart: ^0.70.2
  pdf: ^3.11.1
  excel: ^4.0.6
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  flutter_dotenv: ^5.2.1
  flutter_paymob_sdk: ^1.0.1
  talker: ^5.1.17
  firebase_messaging: ^16.2.0
  firebase_core: ^4.7.0
  flutter_local_notifications: ^18.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  device_info_plus: ^11.3.0
  crypto: ^3.0.6
  sqflite: ^2.4.2
  path: ^1.9.1
  audioplayers: ^6.1.0
  flutter_compass: ^0.8.0
  json_annotation: ^4.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^5.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo (1)/
    - assets/.env
    - assets/sounds/

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
